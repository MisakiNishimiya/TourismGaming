<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NaviBay Pantukan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Garamond', 'Georgia', serif;
            background: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.9)),
                        url('assets/hero-bg.png') center/cover fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 8em;
            font-weight: 300;
            letter-spacing: 15px;
            color: #c9a961;
            margin-bottom: 10px;
            line-height: 1;
        }

        .logo {
            font-size: 2em;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: #c9a961;
            margin: 30px auto;
        }

        h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1em;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #c9a961;
            color: #c9a961;
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9em;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-home:hover {
            background: #c9a961;
            color: #2c3e50;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .footer {
            margin-top: 60px;
            font-size: 0.8em;
            letter-spacing: 2px;
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NAVIBAY</div>
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h1>Lost at Sea</h1>
        <p>The destination you are seeking seems to be beyond the horizon. Let us guide you back to familiar shores.</p>
        <a href="/" class="btn-home">Return to Safety</a>
        <div class="footer">Pantukan Tourism Experience</div>
    </div>
</body>
</html>
